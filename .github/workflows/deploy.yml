name: Deploy to homelab

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest and restart stacks
        id: deploy
        run: |
          OUTPUT=$(/usr/local/bin/home-infra-deploy.sh)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "MANUAL_STEP_NEEDED=1"; then
            echo "manual_step_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "manual_step_needed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          PIHOLE_WEBPASSWORD: ${{ secrets.PIHOLE_WEBPASSWORD }}
          CUPS_ADMIN_PASSWORD: ${{ secrets.CUPS_ADMIN_PASSWORD }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          TZ: ${{ secrets.TZ }}
          DESEC_TOKEN: ${{ secrets.DESEC_TOKEN }}
          BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          SONARR_API_KEY: ${{ secrets.SONARR_API_KEY }}
          RADARR_API_KEY: ${{ secrets.RADARR_API_KEY }}
          HA_LATITUDE: ${{ secrets.HA_LATITUDE }}
          HA_LONGITUDE: ${{ secrets.HA_LONGITUDE }}
          HA_ELEVATION: ${{ secrets.HA_ELEVATION }}

      - name: Notify deploy result
        if: always()
        run: sudo --preserve-env=GMAIL_ADDRESS,GMAIL_APP_PASSWORD,DEPLOY_STATUS,COMMIT_SHA,COMMIT_MSG,MANUAL_STEP_NEEDED /usr/local/bin/home-infra-notify.sh
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DEPLOY_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          MANUAL_STEP_NEEDED: ${{ steps.deploy.outputs.manual_step_needed }}
