services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.11
    container_name: jellyfin
#    user: "1000:1000"

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://jellyfin.${BASE_DOMAIN}
    volumes:
      - ./config/data:/config
      - /mnt/media/tv:/data/tvshows
      - /mnt/media/movies:/data/movies

    networks:
      - proxy_net

    security_opt:
      - no-new-privileges:true

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin-https.rule=Host(`jellyfin.${BASE_DOMAIN}`)"
      - "traefik.http.routers.jellyfin-https.tls=true"
      - "traefik.http.routers.jellyfin-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jellyfin-https.tls.domains[0].main=*.${BASE_DOMAIN}"
      - "traefik.http.routers.jellyfin-https.entrypoints=websecure"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=proxy_net"
      - "homepage.group=Multimedia"
      - "homepage.name=Jellyfin"
      - "homepage.icon=jellyfin.png"
      - "homepage.href=https://jellyfin.${BASE_DOMAIN}"
      - "homepage.description=Streaming de peliculas y series"

    restart: unless-stopped

networks:
  proxy_net:
    external: true
