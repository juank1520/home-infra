version: "3.9"

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
#    user: "1000:1000"

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=8080

    volumes:
      - ./config:/config
      - ./downloads:/downloads

    networks:
      - internal_media_net
      - proxy_net

    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.torrent.rule=Host(`torrent.lan`)"
      - "traefik.http.routers.torrent.entrypoints=websecure"
      - "traefik.http.routers.torrent.tls=true"
      - "traefik.http.services.torrent.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy_net"

networks:
  proxy_net:
    external: true
  internal_media_net:
    external: true
