version: "3.9"

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
#    user: "1000:1000"

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=8080

    volumes:
      - ./config:/config
      - ./downloads:/downloads

    networks:
      - internal_media_net
      - proxy_net

    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.torrent.rule=Host(`torrent.${BASE_DOMAIN}`)"
      - "traefik.http.routers.torrent.entrypoints=websecure"
      - "traefik.http.routers.torrent.tls=true"
      - "traefik.http.routers.torrent.tls.certresolver=letsencrypt"
      - "traefik.http.routers.torrent.tls.domains[0].main=*.${BASE_DOMAIN}"
      - "traefik.http.services.torrent.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy_net"

      - "traefik.http.middlewares.torrent-ipallowlist.ipallowlist.sourcerange=192.168.1.0/24"
      - "traefik.http.routers.torrent.middlewares=torrent-ipallowlist"

      - "homepage.group=Descargas"
      - "homepage.name=qBittorrent"
      - "homepage.icon=qbittorrent.png"
      - "homepage.href=https://torrent.${BASE_DOMAIN}"
      - "homepage.description=Cliente de descargas torrent"

networks:
  proxy_net:
    external: true
  internal_media_net:
    external: true
