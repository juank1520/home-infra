services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
#    user: "1000:1000"

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}

    volumes:
      - ./config/data:/config
      - ./downloads:/downloads
      - ./movies:/movies

    networks:
      - internal_media_net
      - proxy_net

    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${BASE_DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.radarr.tls.domains[0].main=*.${BASE_DOMAIN}"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=proxy_net"

      - "traefik.http.middlewares.radarr-ipallowlist.ipallowlist.sourcerange=192.168.1.0/24"
      - "traefik.http.routers.radarr.middlewares=radarr-ipallowlist"

      - "homepage.group=Descargas"
      - "homepage.name=Radarr"
      - "homepage.icon=radarr.png"
      - "homepage.href=https://radarr.${BASE_DOMAIN}"
      - "homepage.description=Descarga y organizacion automatica de peliculas"

networks:
  proxy_net:
    external: true
  internal_media_net:
    external: true
