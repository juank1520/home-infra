version: "3.9"

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped

    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - INFO=1
      - PING=1
      - VERSION=1
      - POST=0
      - EXEC=0
      - SERVICES=0
      - TASKS=0
      - NODES=0
      - SWARM=0
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - PLUGINS=0
      - SECRETS=0
      - SESSION=0
      - AUTH=0

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - socket_proxy_net

    security_opt:
      - no-new-privileges:true

networks:
  socket_proxy_net:
    external: true
